<?xml version="1.0" encoding="UTF-8"?>
<!--
  Android adaptive-icon foreground.
  Expo recommends a 1024x1024 image with the visual content kept inside
  the central ~66% safe zone (so it isn't clipped by the system mask).
  The background is transparent here; Expo composites it over
  `android.adaptiveIcon.backgroundColor` (#0B0F19) at runtime.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="35%" stop-color="#6366F1"/>
      <stop offset="70%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card">
      <rect x="232" y="232" width="560" height="560" rx="140" ry="140"/>
    </clipPath>
  </defs>

  <!-- soft neon halo (looks great on dark bg from adaptive bg color) -->
  <circle cx="512" cy="500" r="240" fill="url(#neonGrad)" opacity="0.45" filter="url(#glow)"/>

  <!-- main glass tile -->
  <g>
    <rect x="232" y="232" width="560" height="560" rx="140" ry="140" fill="url(#neonGrad)"/>
    <rect x="232" y="232" width="560" height="560" rx="140" ry="140" fill="url(#glassGrad)"/>
    <rect x="246" y="246" width="532" height="532" rx="128" ry="128"
          fill="none" stroke="#FFFFFF" stroke-opacity="0.32" stroke-width="2"/>
  </g>

  <g clip-path="url(#card)" opacity="0.95">
    <path d="M 232 232 Q 512 360 792 232 L 792 380 Q 512 470 232 380 Z"
          fill="#FFFFFF" fill-opacity="0.18"/>
  </g>

  <!-- "P" -->
  <g transform="translate(310 322)">
    <rect x="0" y="0" width="78" height="380" rx="22" fill="#FFFFFF"/>
    <path d="M 78 0 L 220 0 A 110 110 0 0 1 220 220 L 78 220 Z" fill="#FFFFFF"/>
    <path d="M 78 60 L 208 60 A 50 50 0 0 1 208 160 L 78 160 Z" fill="url(#neonGrad)"/>
  </g>

  <!-- "X" -->
  <g transform="translate(560 322)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 36 36 L 244 244" stroke="#FFFFFF" stroke-width="62" fill="none"/>
    <path d="M 244 36 L 36 244" stroke="#FFFFFF" stroke-width="62" fill="none"/>
    <path d="M 36 36 L 96 30 L 30 96 Z" fill="url(#goldGrad)"/>
    <path d="M 244 36 L 184 30 L 250 96 Z" fill="url(#goldGrad)"/>
    <path d="M 244 244 L 184 250 L 250 184 Z" fill="url(#goldGrad)"/>
    <path d="M 36 244 L 96 250 L 30 184 Z" fill="url(#goldGrad)"/>
    <g transform="translate(140 140)">
      <circle r="46" fill="url(#goldGrad)" stroke="#FFFFFF" stroke-width="5"/>
      <g transform="translate(-15 -22)" stroke="#0B0F19" stroke-width="6.5" fill="none" stroke-linecap="round">
        <path d="M 0 0 L 28 0"/>
        <path d="M 0 12 L 28 12"/>
        <path d="M 4 0 C 22 0 22 22 4 22 L 0 22 L 24 44"/>
      </g>
    </g>
  </g>
</svg>
